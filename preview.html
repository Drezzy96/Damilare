<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Damilare Portfolio</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>

<header class="navbar">
  <div class="logo">DAM.</div>
  <nav>
    <a href="#about">About</a>
    <a href="#projects">Projects</a>
    <a href="#price">Price</a>
    <a href="#contact">Contact</a>
  </nav>
  <button class="cta">Let's Talk</button>
</header>

<section class="hero">
  <h1>Hi, I'm <span>Damilare</span></h1>
  <p>3D Designer & Creative Developer</p>
  <button class="btn">Contact Me</button>
</section>

<section id="about" class="section">
  <h2>About Me</h2>
  <p>
    I'm a multidisciplinary 3D designer based in Lagos, Nigeria creating premium digital experiences.
  </p>
</section>

<section id="projects" class="section">
  <h2>Projects</h2>
  <div class="grid" id="projectsGrid"></div>
</section>

<section id="price" class="section">
  <h2>Pricing</h2>
  <div class="grid" id="pricingGrid"></div>
</section>

<section id="contact" class="section">
  <h2>Contact</h2>
  <input placeholder="Name"/>
  <input placeholder="Email"/>
  <textarea placeholder="Your message"></textarea>
  <button class="btn">Send</button>
</section>

<footer>
  © 2025 Damilare — Lagos
</footer>

<script src="script.js"></script>
</body>
</html>
